name: Build APK Frenzo

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Pastikan folder platform Android ada
        run: flutter create --platforms=android --project-name=frenzo_mobile .

      - name: Tambahkan izin internet ke build release
        run: sed -i '/<manifest /a\    <uses-permission android:name="android.permission.INTERNET"/>' android/app/src/main/AndroidManifest.xml

      - name: Ambil dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK sebagai hasil build
        uses: actions/upload-artifact@v4
        with:
          name: frenzo-apk
          path: build/app/outputs/flutter-apk/app-release.apk
